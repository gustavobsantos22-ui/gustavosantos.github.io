<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Funções - CoffeeMart</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            color: #064497;
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #f39c12;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #e67e22;
        }

        #resultado {
            margin-top: 20px;
            padding: 15px;
            background-color: #eef2f7;
            border-radius: 6px;
            display: none; /* Escondido até o cálculo ser feito */
            font-size: 0.95em;
            color: #333;
            line-height: 1.6;
        }

        .destaque {
            font-weight: 600;
            color: #27ae60;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>☕ Painel de Cálculo</h2>
        
        <div class="form-group">
            <label for="inputPreco">Subtotal dos Produtos (R$):</label>
            <input type="number" id="inputPreco" placeholder="Ex: 150.00" step="0.01">
        </div>

        <div class="form-group">
            <label for="inputDistancia">Distância de Entrega (Km):</label>
            <input type="number" id="inputDistancia" placeholder="Ex: 12">
        </div>

        <div class="form-group">
            <label for="inputCupom">Cupom de Desconto (%):</label>
            <input type="number" id="inputCupom" placeholder="Ex: 10">
        </div>

        <button onclick="simularVenda()">Calcular Total</button>

        <div id="resultado"></div>
    </div>

    <script>
        // ---------------------------------------------------------
        // FUNÇÕES MODULARES (Demonstração exigida no projeto)
        // ---------------------------------------------------------

        // 1. Função para calcular o valor do desconto aplicado
        function calcularDesconto(subtotal, porcentagemCupom) {
            if (porcentagemCupom > 0) {
                return subtotal * (porcentagemCupom / 100);
            }
            return 0;
        }

        // 2. Função para calcular o frete com base na quilometragem
        // Regra: Até 5km = Grátis. Acima de 5km = R$ 5,00 fixo + R$ 1,50 por km extra.
        function calcularFrete(distanciaKm) {
            if (distanciaKm <= 5) {
                return 0; // Frete Grátis
            } else {
                let kmExtra = distanciaKm - 5;
                let taxaFixa = 5.00;
                let valorKmExtra = kmExtra * 1.50;
                return taxaFixa + valorKmExtra;
            }
        }

        // 3. Função principal de processamento (Chamada pelo botão)
        function simularVenda() {
            // Capturando os valores digitados (e convertendo para números)
            let subtotal = Number(document.getElementById('inputPreco').value);
            let distancia = Number(document.getElementById('inputDistancia').value);
            let cupom = Number(document.getElementById('inputCupom').value);

            // Validação básica
            if (subtotal <= 0) {
                alert("Por favor, insira um subtotal válido para continuar.");
                return;
            }

            // Chamando as funções modulares criadas acima
            let valorDesconto = calcularDesconto(subtotal, cupom);
            let valorFrete = calcularFrete(distancia);
            
            // Calculando o total final
            let subtotalComDesconto = subtotal - valorDesconto;
            let totalFinal = subtotalComDesconto + valorFrete;

            // Formatando os valores para moeda (R$)
            const formatarMoeda = (valor) => `R$ ${valor.toFixed(2).replace('.', ',')}`;

            // Exibindo o resultado na tela
            let divResultado = document.getElementById('resultado');
            divResultado.style.display = 'block';
            divResultado.innerHTML = `
                Subtotal: <strong>${formatarMoeda(subtotal)}</strong> <br>
                Desconto Aplicado: <strong style="color:red;">- ${formatarMoeda(valorDesconto)}</strong> <br>
                Valor do Frete (${distancia}km): <strong>${formatarMoeda(valorFrete)}</strong> <hr>
                <span style="font-size: 1.2em;">Total Final: <span class="destaque">${formatarMoeda(totalFinal)}</span></span>
            `;
        }
    </script>

</body>
</html>
